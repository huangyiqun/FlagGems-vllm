name: basic ci

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      run_all:
        description: "Run all unit tests on H20"
        required: false
        default: false
        type: boolean
      run_non_nvidia:
        description: "Run selected tests on every enabled non-NVIDIA backend"
        required: false
        default: false
        type: boolean

jobs:
  code-style:
    name: code style
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: check out repository
        uses: actions/checkout@v6

      - name: set up python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: install style tools
        shell: bash
        run: python -m pip install pre-commit

      - name: run pre-commit
        shell: bash
        run: pre-commit run --all-files --show-diff-on-failure

  select-targets:
    name: select ci targets
    needs: code-style
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      mode: ${{ steps.select.outputs.mode }}
      tests: ${{ steps.select.outputs.tests }}
      benchmarks: ${{ steps.select.outputs.benchmarks }}
      non_nvidia_matrix: ${{ steps.select-backends.outputs.matrix }}
    env:
      VIRTUAL_ENV: ${{ github.workspace }}/.venv-select

    steps:
      - id: checkout-attempt-1
        name: check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
        continue-on-error: true

      - id: sleep-1
        if: steps.checkout-attempt-1.outcome == 'failure'
        shell: bash
        run: sleep 30s

      - id: checkout-attempt-2
        name: retry checkout
        if: steps.checkout-attempt-1.outcome == 'failure'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
        continue-on-error: true

      - id: sleep-2
        if: steps.checkout-attempt-2.outcome == 'failure'
        shell: bash
        run: sleep 30s

      - id: checkout-attempt-3
        name: retry checkout again
        if: steps.checkout-attempt-2.outcome == 'failure'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: create selector python environment
        shell: bash
        run: |
          python3 -m venv "${VIRTUAL_ENV}"
          source "${VIRTUAL_ENV}/bin/activate"
          python --version
          test -x "${VIRTUAL_ENV}/bin/python"
          echo "${VIRTUAL_ENV}/bin" >> "$GITHUB_PATH"

      - name: collect ci selection inputs
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            git diff --name-only "${PR_BASE_SHA}" "${GITHUB_SHA}" > changed_files.txt
          elif [[ -n "${BEFORE_SHA}" && "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            git diff --name-only "${BEFORE_SHA}" "${GITHUB_SHA}" > changed_files.txt
          else
            git diff-tree --no-commit-id --name-only -r "${GITHUB_SHA}" > changed_files.txt
          fi

          echo "Changed files:"
          cat changed_files.txt

      - id: select
        name: select tests and benchmarks
        shell: bash
        env:
          RUN_ALL: ${{ github.event_name == 'workflow_dispatch' && inputs.run_all == true }}
        run: |
          if [[ "${RUN_ALL}" == "true" ]]; then
            TEST_SELECTION_MODE="all"
            SELECTED_TESTS="$(find tests -type f -name 'test_*.py' | sort | tr '\n' ' ')"
            SELECTED_BENCHMARKS=""
          else
            selection="$(python tools/select_tests.py \
              --changed-files changed_files.txt \
              --format shell)"
            eval "${selection}"
          fi

          echo "Test selection mode: ${TEST_SELECTION_MODE}"
          if [[ -n "${SELECTED_TESTS}" ]]; then
            echo "Selected tests: ${SELECTED_TESTS}"
          fi
          if [[ -n "${SELECTED_BENCHMARKS}" ]]; then
            echo "Selected benchmarks: ${SELECTED_BENCHMARKS}"
          fi

          echo "mode=${TEST_SELECTION_MODE}" >> "${GITHUB_OUTPUT}"
          echo "tests=${SELECTED_TESTS}" >> "${GITHUB_OUTPUT}"
          echo "benchmarks=${SELECTED_BENCHMARKS}" >> "${GITHUB_OUTPUT}"

      # Keep this ref aligned with the reusable workflow and setup action below.
      # Reading FlagGems' registry avoids maintaining a second backend list here.
      - name: check out FlagGems backend registry
        uses: actions/checkout@v6
        with:
          repository: flagos-ai/FlagGems
          ref: 358368a02603789f56323aaa38f02c1ccc5f78e9
          sparse-checkout: .github/backends.json
          sparse-checkout-cone-mode: false
          path: .ci/flaggems-registry
          persist-credentials: false

      - id: select-backends
        name: select non-NVIDIA backends
        shell: python {0}
        env:
          ENABLE_NON_NVIDIA: ${{ github.event_name != 'workflow_dispatch' || inputs.run_non_nvidia == true }}
        run: |
          import json
          import os
          from pathlib import Path

          registry = json.loads(
              Path(".ci/flaggems-registry/.github/backends.json").read_text()
          )
          enabled = os.environ.get("ENABLE_NON_NVIDIA") == "true"

          selected = [
              backend
              for backend in registry
              if enabled
              and backend["enabled"]
              and not backend["backend"].startswith("nvidia")
          ]
          matrix = {
              "include": [
                  {
                      "backend": backend["backend"],
                      "runner_label": backend["runner_label"],
                      "gpu_check": backend["gpu_check"],
                  }
                  for backend in selected
              ]
          }
          print("Selected non-NVIDIA backends:", [b["backend"] for b in selected])
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"matrix={json.dumps(matrix, separators=(',', ':'))}\n")

  nvidia-tests:
    name: nvidia tests and benchmarks
    needs: select-targets
    if: needs.select-targets.outputs.tests != '' || needs.select-targets.outputs.benchmarks != ''
    runs-on: h20
    timeout-minutes: 60
    env:
      FLAGGEMS_VENDOR: nvidia
      PYTHONPATH: ${{ github.workspace }}/src
      VENV_DIR: ${{ github.workspace }}/.venv
      VIRTUAL_ENV: ${{ github.workspace }}/.venv

    steps:
      - name: check out repository
        uses: actions/checkout@v6

      - name: show gpu
        shell: bash
        run: nvidia-smi

      - name: install and activate python environment
        shell: bash
        run: |
          source tools/setup.sh
          source "${VENV_DIR}/bin/activate"
          test -x "${VENV_DIR}/bin/python"
          echo "VIRTUAL_ENV=${VENV_DIR}" >> "$GITHUB_ENV"
          echo "${VENV_DIR}/bin" >> "$GITHUB_PATH"
          if [[ -n "${CUDA_HOME:-}" ]]; then
            echo "CUDA_HOME=${CUDA_HOME}" >> "$GITHUB_ENV"
            echo "${CUDA_HOME}/bin" >> "$GITHUB_PATH"
          fi
          if [[ -n "${LD_LIBRARY_PATH:-}" ]]; then
            echo "LD_LIBRARY_PATH=${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
          fi
          python --version

      - name: run selected unit tests
        if: needs.select-targets.outputs.tests != ''
        shell: bash
        env:
          SELECTED_TESTS: ${{ needs.select-targets.outputs.tests }}
        run: |
          echo "Selected tests: ${SELECTED_TESTS}"
          pytest -q ${SELECTED_TESTS} --quick

      - name: run selected benchmarks
        if: needs.select-targets.outputs.benchmarks != ''
        shell: bash
        env:
          SELECTED_BENCHMARKS: ${{ needs.select-targets.outputs.benchmarks }}
        run: |
          echo "Selected benchmarks: ${SELECTED_BENCHMARKS}"
          pytest -q ${SELECTED_BENCHMARKS} --level core

  non-nvidia-tests:
    name: ${{ matrix.backend }} tests and benchmarks
    needs: select-targets
    # The called workflow executes caller-controlled code on shared self-hosted
    # runners, so untrusted fork pull requests must not enter this job.
    if: >-
      (needs.select-targets.outputs.tests != '' || needs.select-targets.outputs.benchmarks != '')
      && fromJSON(needs.select-targets.outputs.non_nvidia_matrix).include[0] != null
      && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.select-targets.outputs.non_nvidia_matrix) }}
    uses: flagos-ai/FlagGems/.github/workflows/backend-test.yaml@358368a02603789f56323aaa38f02c1ccc5f78e9
    with:
      backend: ${{ matrix.backend }}
      runner_label: ${{ matrix.runner_label }}
      gpu_check_script: ${{ matrix.gpu_check }}
      changed_files: >-
        ${{ needs.select-targets.outputs.tests }}
        ${{ needs.select-targets.outputs.benchmarks }}
      test_script: tools/run-multi-backend-tests.sh
    # FlagGems currently declares this unused secret as required. Pass only the
    # caller's read-only token instead of exposing a long-lived runner SSH key.
    secrets:
      RUNNER_SSH_KEY: ${{ secrets.GITHUB_TOKEN }}
